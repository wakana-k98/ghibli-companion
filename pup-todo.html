<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jiji's To-Do</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --gnd:    #F4E9C4;
  --srf:    #FEFBF0;
  --txt:    #26190A;
  --mut:    #8A7040;
  --acc:    #6DC4CE;
  --fish:   #E07040;
  --danger: #C05050;
  --bdr:    rgba(38,25,10,0.11);
  --shd:    0 3px 18px rgba(38,25,10,0.09);
  --rLg:    20px;
  --rSm:    13px;
  --rPill:  100px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background-color: var(--gnd);
  background-image: radial-gradient(rgba(255,255,255,0.28) 1px, transparent 1px);
  background-size: 20px 20px;
  color: var(--txt);
  font-family: 'Nunito', system-ui, sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.1rem 1rem 2.5rem;
}

.app {
  width: 100%;
  max-width: 370px;
  display: flex;
  flex-direction: column;
  gap: 0.85rem;
}

/* ── Header ── */
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 0 0.2rem;
}
.hdr h1 {
  font-size: 1.65rem;
  font-weight: 900;
  letter-spacing: -0.04em;
  line-height: 1;
}
.fish-badge {
  display: flex;
  align-items: center;
  gap: 0.28rem;
  background: var(--srf);
  border: 1.5px solid var(--bdr);
  border-radius: var(--rPill);
  padding: 0.28rem 0.65rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.75rem;
  font-weight: 700;
  box-shadow: var(--shd);
}
.fish-ico { color: var(--fish); }

/* ── Input ── */
.input-row { display: flex; gap: 0.45rem; }
.task-input {
  flex: 1;
  background: var(--srf);
  border: 1.5px solid var(--bdr);
  border-radius: var(--rPill);
  padding: 0.62rem 1.05rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--txt);
  outline: none;
  box-shadow: var(--shd);
  transition: border-color 0.15s;
}
.task-input::placeholder { color: var(--mut); font-weight: 400; }
.task-input:focus { border-color: var(--acc); }
.btn-add {
  background: var(--txt);
  color: var(--gnd);
  border: none;
  border-radius: var(--rPill);
  padding: 0.62rem 0.95rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.86rem;
  font-weight: 800;
  cursor: pointer;
  box-shadow: var(--shd);
  transition: transform 0.1s, opacity 0.12s;
  white-space: nowrap;
}
.btn-add:hover { opacity: 0.82; }
.btn-add:active { transform: scale(0.93); }

/* ── Task list ── */
.task-list { display: flex; flex-direction: column; gap: 0.4rem; }

.task-item {
  background: var(--srf);
  border: 1.5px solid var(--bdr);
  border-radius: var(--rSm);
  padding: 0.65rem 0.85rem;
  display: flex;
  align-items: center;
  gap: 0.55rem;
  box-shadow: 0 2px 7px rgba(38,25,10,0.07);
  transition: opacity 0.22s;
}
.task-item.done { opacity: 0.42; }
.task-item.done .task-lbl { text-decoration: line-through; color: var(--mut); }

.chk-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--bdr);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; color: white; font-weight: 800;
  transition: background 0.15s, border-color 0.15s;
}
.chk-btn:hover { border-color: var(--acc); }
.task-item.done .chk-btn { background: var(--acc); border-color: var(--acc); }

.task-lbl {
  flex: 1;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--txt);
  word-break: break-word;
}
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--mut); font-size: 1rem; line-height: 1; padding: 0.1rem;
  opacity: 0.28; transition: opacity 0.12s, color 0.12s; flex-shrink: 0;
}
.del-btn:hover { opacity: 1; color: var(--danger); }
.empty-state {
  text-align: center; padding: 1.25rem 0;
  color: var(--mut); font-size: 0.83rem; font-weight: 600;
}

/* ── Cat stage card ── */
.stage-card {
  background: var(--srf);
  border: 1.5px solid var(--bdr);
  border-radius: var(--rLg);
  overflow: hidden;
  box-shadow: var(--shd);
}

/* Reward strip */
.reward-strip {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  padding: 0.7rem 1rem;
  border-bottom: 1.5px solid var(--bdr);
  background: var(--gnd);
}
.reward-strip.on { display: flex; }
.reward-lbl {
  font-family: 'Space Mono', monospace;
  font-size: 0.59rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--mut);
}
.reward-btns { display: flex; gap: 0.45rem; }
.reward-btn {
  background: var(--srf);
  border: 1.5px solid var(--bdr);
  border-radius: var(--rPill);
  padding: 0.38rem 0.78rem;
  font-family: 'Nunito', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s, transform 0.1s;
}
.reward-btn:hover { background: var(--acc); border-color: var(--acc); color: white; }
.reward-btn:active { transform: scale(0.93); }

/* Stage floor */
.cat-stage {
  position: relative;
  height: 145px;
  background: linear-gradient(to bottom, var(--srf), #F0E8C8 88%, #D8C888 100%);
  overflow: hidden;
}

/* Grass strokes on floor */
.cat-stage::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 18px;
  background: repeating-linear-gradient(
    90deg,
    transparent 0px, transparent 14px,
    rgba(140,120,60,0.15) 14px, rgba(140,120,60,0.15) 15px
  );
  pointer-events: none;
}

/* Cat position container — JS moves .left */
#cat-pos {
  position: absolute;
  bottom: 14px;
  left: 20px;
}

/* ── Cat animations ── */
@keyframes walk-bob {
  0%, 100% { transform: translateY(0px); }
  50%       { transform: translateY(-7px); }
}
@keyframes jump {
  0%   { transform: translateY(0); }
  28%  { transform: translateY(-26px); }
  52%  { transform: translateY(-10px); }
  72%  { transform: translateY(-20px); }
  100% { transform: translateY(0); }
}
@keyframes tail-sway {
  0%, 100% { transform: rotate(0deg); }
  50%       { transform: rotate(16deg); }
}
@keyframes tail-fast {
  0%, 100% { transform: rotate(-8deg); }
  50%       { transform: rotate(22deg); }
}
@keyframes heart-rise {
  0%   { opacity: 0; transform: translateY(0px); }
  18%  { opacity: 1; }
  82%  { opacity: 1; }
  100% { opacity: 0; transform: translateY(-32px); }
}
@keyframes eat-nod {
  0%, 100% { transform: rotate(0deg); }
  28%       { transform: rotate(-14deg); }
  58%       { transform: rotate(-9deg); }
}
@keyframes blink {
  0%, 90%, 100% { transform: scaleY(1); }
  94%            { transform: scaleY(0.1); }
}

/* State classes on #cat-pos */
#cat-inner { /* JS-controlled walk animation */ }

.walking #cat-inner { animation: walk-bob 0.38s ease-in-out infinite; }
.playing #cat-inner { animation: jump 0.52s ease-out 2; }

/* Flip when going left */
.facing-left #cat-svg { transform: scaleX(-1); }

/* Tail */
#g-tail {
  transform-box: fill-box;
  transform-origin: 0% 100%;
}
.walking  #g-tail { animation: tail-sway 0.55s ease-in-out infinite; }
.sitting  #g-tail { animation: tail-sway 1.7s ease-in-out infinite; }
.petting  #g-tail { animation: tail-fast 0.6s ease-in-out infinite; }
.playing  #g-tail { animation: tail-fast 0.3s ease-in-out infinite; }
.eating   #g-tail { animation: tail-sway 1.2s ease-in-out infinite; }

/* Eating nod */
#g-inner { transform-origin: 50px 42px; }
.eating #g-inner { animation: eat-nod 0.55s ease-in-out 3; }

/* Eyes blink */
#g-eyes { transform-box: fill-box; transform-origin: 50% 50%; }
.walking #g-eyes { animation: blink 4s ease-in-out infinite; }
.sitting #g-eyes { animation: blink 3s ease-in-out infinite; }

/* Blush */
#g-blush { opacity: 0; transition: opacity 0.4s; }
.petting #g-blush { opacity: 1; }

/* Heart */
#g-heart { opacity: 0; pointer-events: none; }
.petting #g-heart { animation: heart-rise 2s ease-out forwards; }

/* Focus */
:focus-visible {
  outline: 2.5px solid var(--acc);
  outline-offset: 2px;
  border-radius: 4px;
}

@media (prefers-reduced-motion: reduce) {
  #cat-inner, #g-tail, #g-inner, #g-eyes, #g-heart { animation: none !important; }
  .petting #g-blush { opacity: 1; }
}
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <h1>Jiji's To-Do</h1>
    <div class="fish-badge" aria-live="polite" aria-label="Fish earned">
      <span class="fish-ico">🐟</span>
      <span id="fish-num">0</span>
    </div>
  </header>

  <div class="input-row">
    <input type="text" class="task-input" id="task-input"
           placeholder="Add something to do…" autocomplete="off" aria-label="New task">
    <button class="btn-add" id="btn-add">+ Add</button>
  </div>

  <div class="task-list" id="task-list" aria-live="polite"></div>

  <!-- Cat card -->
  <div class="stage-card">

    <!-- Reward popup strip -->
    <div class="reward-strip" id="reward-strip" role="region" aria-label="Reward Jiji">
      <span class="reward-lbl" id="reward-lbl">✨ Task done! How should Jiji celebrate?</span>
      <div class="reward-btns">
        <button class="reward-btn" id="btn-feed">🐟 Feed</button>
        <button class="reward-btn" id="btn-pet">✋ Pet</button>
        <button class="reward-btn" id="btn-play">🎾 Play</button>
      </div>
    </div>

    <!-- Walking stage -->
    <div class="cat-stage" id="cat-stage">
      <div id="cat-pos">
        <div id="cat-inner">

          <svg id="cat-svg" viewBox="0 0 100 148" width="78" height="116"
               xmlns="http://www.w3.org/2000/svg" overflow="visible"
               role="img" aria-label="Jiji the cat">

            <!-- Tail (behind body) -->
            <g id="g-tail">
              <path d="M 52 114 C 75 106 84 84 76 64 C 70 50 76 36 72 24"
                    stroke="#16162A" stroke-width="10" fill="none"
                    stroke-linecap="round" stroke-linejoin="round"/>
              <!-- Tail tuft -->
              <circle cx="71" cy="21" r="7.5" fill="#1E1E30"/>
            </g>

            <!-- Body -->
            <ellipse cx="50" cy="112" rx="24" ry="28" fill="#16162A"/>

            <!-- Everything that nods for eating -->
            <g id="g-inner">

              <!-- Left ear outer -->
              <polygon points="22,40 14,8 44,32" fill="#16162A"/>
              <!-- Left ear inner -->
              <polygon points="25,38 19,14 40,31" fill="#8C7CC0"/>

              <!-- Right ear outer -->
              <polygon points="78,40 86,8 56,32" fill="#16162A"/>
              <!-- Right ear inner -->
              <polygon points="75,38 81,14 60,31" fill="#8C7CC0"/>

              <!-- Head -->
              <circle cx="50" cy="52" r="37" fill="#16162A"/>

              <!-- Blush cheeks (petting state) -->
              <g id="g-blush">
                <ellipse cx="24" cy="66" rx="9" ry="5.5" fill="#E08080" opacity="0.32"/>
                <ellipse cx="76" cy="66" rx="9" ry="5.5" fill="#E08080" opacity="0.32"/>
              </g>

              <!-- Eyes open -->
              <g id="g-eyes">
                <circle cx="35" cy="48" r="13" fill="#7ECAD4"/>
                <circle cx="65" cy="48" r="13" fill="#7ECAD4"/>
                <circle cx="35" cy="49" r="9" fill="#0C0C1E"/>
                <circle cx="65" cy="49" r="9" fill="#0C0C1E"/>
                <!-- Shine -->
                <circle cx="38.5" cy="43.5" r="3.5" fill="white"/>
                <circle cx="68.5" cy="43.5" r="3.5" fill="white"/>
                <circle cx="33" cy="51"   r="1.5" fill="white" opacity="0.45"/>
                <circle cx="63" cy="51"   r="1.5" fill="white" opacity="0.45"/>
              </g>

              <!-- Eyes closed (petting) — hidden by default -->
              <g id="g-eyes-closed" style="display:none">
                <path d="M 23,47 Q 35,58 47,47"
                      stroke="#1A1A32" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                <path d="M 53,47 Q 65,58 77,47"
                      stroke="#1A1A32" stroke-width="3.5" fill="none" stroke-linecap="round"/>
              </g>

              <!-- Nose -->
              <ellipse cx="50" cy="63" rx="4" ry="3" fill="#CC7070"/>

              <!-- Mouth: happy (default) -->
              <g id="g-mouth-happy">
                <path d="M 42,69 Q 50,77 58,69"
                      stroke="#BC6060" stroke-width="1.8" fill="none" stroke-linecap="round"/>
                <!-- fangs -->
                <polygon points="46,70 44,76 48,76" fill="white" opacity="0.88"/>
                <polygon points="54,70 52,76 56,76" fill="white" opacity="0.88"/>
              </g>

              <!-- Mouth: eating (shown during feed) -->
              <g id="g-mouth-eat" style="display:none">
                <path d="M 41,68 Q 50,80 59,68 L 59,72 Q 50,83 41,72 Z"
                      fill="#A05050" opacity="0.82"/>
                <ellipse cx="50" cy="76" rx="5" ry="3" fill="#C07070" opacity="0.5"/>
              </g>

              <!-- Mouth: wide smile (petting) -->
              <g id="g-mouth-pet" style="display:none">
                <path d="M 38,69 Q 50,81 62,69"
                      stroke="#BC6060" stroke-width="2" fill="none" stroke-linecap="round"/>
              </g>

              <!-- Whiskers -->
              <g stroke="rgba(210,198,172,0.52)" stroke-width="1" stroke-linecap="round">
                <line x1="16" y1="60" x2="42" y2="63"/>
                <line x1="14" y1="66" x2="40" y2="66"/>
                <line x1="16" y1="72" x2="42" y2="69"/>
                <line x1="84" y1="60" x2="58" y2="63"/>
                <line x1="86" y1="66" x2="60" y2="66"/>
                <line x1="84" y1="72" x2="58" y2="69"/>
              </g>

            </g> <!-- /g-inner -->

            <!-- Front paws -->
            <ellipse cx="40" cy="139" rx="10" ry="6" fill="#1E1E30"/>
            <ellipse cx="60" cy="139" rx="10" ry="6" fill="#1E1E30"/>
            <ellipse cx="40" cy="138" rx="8"  ry="4.5" fill="#16162A"/>
            <ellipse cx="60" cy="138" rx="8"  ry="4.5" fill="#16162A"/>

            <!-- Floating heart (petting reward) -->
            <g id="g-heart">
              <text x="78" y="18" font-size="15" text-anchor="middle"
                    style="user-select:none;font-family:sans-serif">💕</text>
            </g>

          </svg>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────
  var tasks         = [];
  var fishCount     = 0;
  var pendingRewards = 0;

  var catState  = 'walking'; // walking | sitting | eating | petting | playing
  var catX      = 20;
  var catDir    = 1;   // 1 = right, -1 = left
  var rafId     = null;
  var stateTimer = null;

  // ── Persistence ────────────────────────────────────────────────────────
  function load() {
    try {
      tasks     = JSON.parse(localStorage.getItem('jiji-tasks') || '[]');
      fishCount = parseInt(localStorage.getItem('jiji-fish')  || '0', 10);
    } catch (_) { tasks = []; fishCount = 0; }
  }

  function save() {
    localStorage.setItem('jiji-tasks', JSON.stringify(tasks));
    localStorage.setItem('jiji-fish',  String(fishCount));
  }

  // ── Task operations ─────────────────────────────────────────────────────
  function addTask(text) {
    text = text.trim();
    if (!text) return;
    tasks.unshift({ id: Date.now(), text: text, done: false });
    save(); render();
  }

  function completeTask(id) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t || t.done) return;
    t.done = true;
    fishCount++;
    pendingRewards++;
    save();
    setCatState('sitting');
    updateRewardUI();
    render();
  }

  function undoTask(id) {
    var t = tasks.find(function (x) { return x.id === id; });
    if (!t) return;
    t.done = !t.done;
    save(); render();
  }

  function removeTask(id) {
    tasks = tasks.filter(function (x) { return x.id !== id; });
    save(); render();
  }

  // ── Reward system ───────────────────────────────────────────────────────
  function updateRewardUI() {
    var strip = document.getElementById('reward-strip');
    if (pendingRewards > 0) {
      strip.classList.add('on');
      var suffix = pendingRewards > 1 ? ' (' + pendingRewards + ' pending)' : '';
      document.getElementById('reward-lbl').textContent =
        '✨ Task done! How should Jiji celebrate?' + suffix;
    } else {
      strip.classList.remove('on');
    }
  }

  function claimReward(type) {
    pendingRewards = Math.max(0, pendingRewards - 1);
    updateRewardUI();

    if (type === 'feed')  startFeed();
    else if (type === 'pet')  startPet();
    else if (type === 'play') startPlay();
  }

  // ── Cat expressions ─────────────────────────────────────────────────────
  function setFace(preset) {
    // preset: 'default' | 'eating' | 'petting'
    var eyesOpen   = document.getElementById('g-eyes');
    var eyesClosed = document.getElementById('g-eyes-closed');
    var mouthHappy = document.getElementById('g-mouth-happy');
    var mouthEat   = document.getElementById('g-mouth-eat');
    var mouthPet   = document.getElementById('g-mouth-pet');

    eyesOpen.style.display   = '';
    eyesClosed.style.display = 'none';
    mouthHappy.style.display = '';
    mouthEat.style.display   = 'none';
    mouthPet.style.display   = 'none';

    if (preset === 'eating') {
      mouthHappy.style.display = 'none';
      mouthEat.style.display   = '';
    } else if (preset === 'petting') {
      eyesOpen.style.display   = 'none';
      eyesClosed.style.display = '';
      mouthHappy.style.display = 'none';
      mouthPet.style.display   = '';
    }
  }

  // ── Cat state machine ────────────────────────────────────────────────────
  function setCatState(s) {
    catState = s;
    var pos = document.getElementById('cat-pos');
    // Preserve facing direction
    var wasLeft = pos.classList.contains('facing-left');
    pos.className = s + (wasLeft ? ' facing-left' : '');

    if (s === 'petting') setFace('petting');
    else if (s === 'eating') setFace('eating');
    else setFace('default');
  }

  function startFeed() {
    setCatState('eating');
    clearTimeout(stateTimer);
    stateTimer = setTimeout(afterRewardAnim, 2600);
  }
  function startPet() {
    setCatState('petting');
    clearTimeout(stateTimer);
    stateTimer = setTimeout(afterRewardAnim, 3000);
  }
  function startPlay() {
    setCatState('playing');
    clearTimeout(stateTimer);
    stateTimer = setTimeout(afterRewardAnim, 1200);
  }

  function afterRewardAnim() {
    if (pendingRewards > 0) {
      setCatState('sitting');
    } else {
      setCatState('walking');
      startWalk();
    }
  }

  // ── Walking engine ────────────────────────────────────────────────────────
  function startWalk() {
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(step);
  }

  function step() {
    if (catState !== 'walking') return;
    var stage  = document.getElementById('cat-stage');
    var maxX   = stage.offsetWidth - 82; // cat render width ~78 + margin
    catX += catDir * 1.3;
    if (catX >= maxX) { catX = maxX; catDir = -1; applyDir(); }
    if (catX <= 0)    { catX = 0;    catDir =  1; applyDir(); }
    document.getElementById('cat-pos').style.left = catX + 'px';
    rafId = requestAnimationFrame(step);
  }

  function applyDir() {
    var pos = document.getElementById('cat-pos');
    if (catDir === -1) pos.classList.add('facing-left');
    else               pos.classList.remove('facing-left');
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render() {
    document.getElementById('fish-num').textContent = fishCount;

    var listEl = document.getElementById('task-list');
    if (!tasks.length) {
      listEl.innerHTML = '<div class="empty-state">No tasks yet — add one for Jiji!</div>';
      return;
    }
    listEl.innerHTML = tasks.map(function (t) {
      var chk = t.done ? '✓' : '';
      var lbl = t.done ? 'Undo' : 'Complete';
      return (
        '<div class="task-item' + (t.done ? ' done' : '') + '">' +
          '<button class="chk-btn" onclick="cat.check(' + t.id + ')" aria-label="' + lbl + ' task">' + chk + '</button>' +
          '<span class="task-lbl">' + esc(t.text) + '</span>' +
          '<button class="del-btn" onclick="cat.del(' + t.id + ')" aria-label="Delete task">\xD7</button>' +
        '</div>'
      );
    }).join('');
  }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Events ────────────────────────────────────────────────────────────────
  var inp = document.getElementById('task-input');

  function submit() {
    var v = inp.value.trim();
    if (v) { addTask(v); inp.value = ''; }
    inp.focus();
  }

  inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') submit(); });
  document.getElementById('btn-add').addEventListener('click', submit);
  document.getElementById('btn-feed').addEventListener('click', function () { claimReward('feed'); });
  document.getElementById('btn-pet').addEventListener('click',  function () { claimReward('pet');  });
  document.getElementById('btn-play').addEventListener('click', function () { claimReward('play'); });

  // ── Public API for inline handlers ────────────────────────────────────────
  window.cat = {
    check: function (id) {
      var t = tasks.find(function (x) { return x.id === id; });
      if (!t) return;
      if (t.done) undoTask(id);
      else completeTask(id);
    },
    del: removeTask
  };

  // ── Boot ──────────────────────────────────────────────────────────────────
  load();
  render();
  setCatState('walking');
  startWalk();
}());
</script>
</body>
</html>
